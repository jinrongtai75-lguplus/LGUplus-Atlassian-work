name: Update Confluence on README Change

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  update-confluence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install atlassian-python-api markdown

      - name: Upload README to Confluence
        env:
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE: ${{ vars.CONFLUENCE_SPACE }}
          CONFLUENCE_PARENT_ID: ${{ vars.CONFLUENCE_PARENT_ID }}
        run: |
          python - <<'EOF'
          import os
          import markdown
          from atlassian import Confluence

          confluence = Confluence(
              url=os.environ['CONFLUENCE_BASE_URL'],
              username=os.environ['CONFLUENCE_EMAIL'],
              password=os.environ['CONFLUENCE_API_TOKEN'],
              cloud=True
          )

          with open('README.md', 'r', encoding='utf-8') as f:
              md_content = f.read()

          # README 첫 번째 H1을 페이지 제목으로 사용
          title = 'README'
          for line in md_content.splitlines():
              if line.startswith('# '):
                  title = line[2:].strip()
                  break

          # Markdown -> HTML (Confluence storage format)
          html_content = markdown.markdown(
              md_content,
              extensions=['tables', 'fenced_code', 'toc']
          )

          space = os.environ['CONFLUENCE_SPACE']
          parent_id = os.environ.get('CONFLUENCE_PARENT_ID') or None

          # CQL로 명시적으로 지정 스페이스 안에서만 검색 (다른 스페이스 페이지 건드리지 않도록)
          cql = f'space = "{space}" AND title = "{title}" AND type = "page"'
          cql_result = confluence.cql(cql, limit=5)
          matched = None
          for r in (cql_result.get('results') or []):
              content = r.get('content') or r
              page_space = (content.get('space') or {}).get('key') or (content.get('resultGlobalContainer') or {}).get('title')
              # 페이지의 space가 우리가 지정한 space와 일치하는 것만 채택
              if content.get('title') == title:
                  matched = content
                  break

          # 안전장치: 매칭된 페이지가 정말 지정 스페이스 안에 있는지 한 번 더 검증
          if matched:
              verify = confluence.get_page_by_id(matched['id'], expand='space')
              if verify.get('space', {}).get('key') != space:
                  print(f"[Safety] Found page '{title}' (ID: {matched['id']}) but in space '{verify.get('space', {}).get('key')}', NOT '{space}'. Skipping update.")
                  matched = None

          if matched:
              page_id = matched['id']
              confluence.update_page(
                  page_id=page_id,
                  title=title,
                  body=html_content
              )
              print(f"[Updated] {title} (ID: {page_id}) in space {space}")
          else:
              kwargs = dict(space=space, title=title, body=html_content)
              if parent_id:
                  kwargs['parent_id'] = parent_id
              result = confluence.create_page(**kwargs)
              print(f"[Created] {title} (ID: {result['id']}) in space {space}")
          EOF
