name: Upload README to Confluence

# Dispatch-only. README.md is the body source (committed by the caller
# before dispatch). Per-call parameters (space, parent_id, title) come
# in as workflow inputs — no shared variable state is mutated between
# runs, so concurrent uploads cannot interfere with each other.

on:
  workflow_dispatch:
    inputs:
      space:
        description: 'Confluence space key (e.g. M2M). Falls back to vars.CONFLUENCE_SPACE if blank.'
        required: false
        default: ''
      parent_id:
        description: 'Parent page ID. If blank, page is created at space root.'
        required: false
        default: ''
      title:
        description: 'Page title. If blank, the first H1 of README.md is used.'
        required: false
        default: ''

jobs:
  update-confluence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install atlassian-python-api markdown

      - name: Upload README to Confluence
        env:
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          INPUT_SPACE: ${{ inputs.space }}
          INPUT_PARENT_ID: ${{ inputs.parent_id }}
          INPUT_TITLE: ${{ inputs.title }}
          FALLBACK_SPACE: ${{ vars.CONFLUENCE_SPACE }}
        run: |
          python - <<'EOF'
          import os
          import sys
          import markdown
          from atlassian import Confluence

          confluence = Confluence(
              url=os.environ['CONFLUENCE_BASE_URL'],
              username=os.environ['CONFLUENCE_EMAIL'],
              password=os.environ['CONFLUENCE_API_TOKEN'],
              cloud=True
          )

          space = (os.environ.get('INPUT_SPACE') or os.environ.get('FALLBACK_SPACE') or '').strip()
          if not space:
              print("ERROR: no space provided (input or vars.CONFLUENCE_SPACE)", file=sys.stderr)
              sys.exit(1)

          parent_id = (os.environ.get('INPUT_PARENT_ID') or '').strip() or None
          input_title = (os.environ.get('INPUT_TITLE') or '').strip()

          with open('README.md', 'r', encoding='utf-8') as f:
              md_content = f.read()

          # Resolve page title: explicit input wins, otherwise first H1 in README.
          title = input_title
          if not title:
              for line in md_content.splitlines():
                  if line.startswith('# '):
                      title = line[2:].strip()
                      break
          if not title:
              title = 'README'

          html_content = markdown.markdown(
              md_content,
              extensions=['tables', 'fenced_code', 'toc']
          )

          # Find an existing page with this title in the same space (titles are
          # unique per space in Confluence). If found, update its body; do not
          # move it across parents — moving silently is risky.
          cql = f'space = "{space}" AND title = "{title}" AND type = "page"'
          cql_result = confluence.cql(cql, limit=5)
          matched = None
          for r in (cql_result.get('results') or []):
              content = r.get('content') or r
              if content.get('title') == title:
                  matched = content
                  break

          if matched:
              verify = confluence.get_page_by_id(matched['id'], expand='space')
              if verify.get('space', {}).get('key') != space:
                  print(
                      f"[Safety] Found page '{title}' (ID: {matched['id']}) "
                      f"but in space '{verify.get('space', {}).get('key')}', "
                      f"NOT '{space}'. Skipping update."
                  )
                  matched = None

          if matched:
              page_id = matched['id']
              confluence.update_page(
                  page_id=page_id,
                  title=title,
                  body=html_content,
              )
              print(f"[Updated] {title} (ID: {page_id}) in space {space}")
          else:
              kwargs = dict(space=space, title=title, body=html_content)
              if parent_id:
                  kwargs['parent_id'] = parent_id
              result = confluence.create_page(**kwargs)
              loc = f"under parent {parent_id}" if parent_id else "at space root"
              print(f"[Created] {title} (ID: {result['id']}) in space {space} {loc}")
          EOF
